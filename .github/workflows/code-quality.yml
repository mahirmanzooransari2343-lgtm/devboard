# Goal of the of this is for my I Have to SAST for my code
name: code-quality

on: 
    workflow_call: 


jobs:
    code-quality-frontend:

        
        runs-on: ubuntu-latest
        
        steps:
            - name:  code checkouy 
              uses:  actions/checkout@v7

            - name: set up node jobs
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm  
                cache-dependency-path: frontend/package-lock.json

            - name: install npm package
              run: npm install
              working-directory: frontend

            - name: Run the Linter
              run: npm run lint
              working-directory: frontend

    code-quality-backend:
        runs-on: ubuntu-latest

        steps:
          
          - name:  code checkout
            uses:  actions/checkout@v7

          - name:  set up the Gcontinue-on-error
            uses:  actions/setup-go@v6
            with:
              go-version: '1.23'
              go-version-file: 'go.mod'
              cache-dependency-path: 'go.sum'
            
          - name:  Run Linter
            run:  go fmt
            working-directory: backend

          - name: run wet for comiler issue
            run:  go vet
            working-directory: backend


           
        