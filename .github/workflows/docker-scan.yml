# Goal I have to  ensure the docker file and image is secure

name: docker scan

on: 
    workflow_call: 


jobs:
    docker-file-lint:
        runs-on: ubuntu-latest
        strategy:
          matrix:
            folder: ["backend","frontend"]
        
        steps:
            - name: code  checkout
              uses:  actions/checkout@v7

            - name:  ${{ matrix.folder}}   Docker file lint
              uses: hadolint/hadolint-action@v3.1.0
              with:
                dockerfile: ${{ matrix.folder }}/Dockerfile

            - name: docker setup [login]
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: docker build  ${{ matrix.folder }}
              run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/devboard-${{ matrix.folder }}:latest .
              working-directory: ${{ matrix.folder }}

            
            - name: Docker file scan [run trivyy action vernabillity]
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: ${{ vars.DOCKERHUB_USERNAME }}/devboard-${{ matrix.folder }}:latest
                format: "table"
                exit-code: "1"
                ignore-unfixed: true
                vuln-type: 'os library'
                severity: CRITICAL,HIGH 


    
                