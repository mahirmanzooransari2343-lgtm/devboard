# Goal i Have to check and scan the the dependency for my code

name: dependency scan

on:
    workflow_call: 


jobs:
    dependency-Scan-frontend:
        runs-on: ubuntu-latest
        steps:
            - name: code chechout 
              uses: actions/checkout@v7
              
            - name: setup node js
              uses: actions/setup-node@v6
              with:
                node-version: "20"
                cache: npm
                cache-dependency-path: frontend/package-lock.json

            - name: install package 
              run:  npm install
              working-directory: ./frontend

            - name: Run npm audit
              continue-on-error: true
              run:  npm audit
              working-directory: ./frontend

            - name: upload the artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: node js vernability
                path: vulnerability-report.txt
                retention-days: 5


    dependency-sacn-backend:

        runs-on: ubuntu-latest

        steps:



            - name: code checkout 
              uses: actions/checkout@v7

            - name:  set up the Gcontinue-on-error
              uses:  actions/setup-go@v6
              with:
                go-version: '1.22'
                go-version-file: 'go.mod'
                cache-dependency-path: 'go.sum'
                cache: true

            - name: install dependency scaner
              run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
              working-directory: ./backend

            - name:  run the scanner
              continue-on-error: true
              run:  govulncheck ./...
              working-directory: ./backend

            - name: upload the artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: golang-vulnerability-report
                path: vulnerability-report.txt
                retention-days: 5
 