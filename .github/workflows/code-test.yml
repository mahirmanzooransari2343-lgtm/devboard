# Goal --> i have to test the code 

name: code-test

on: 
    workflow_call: 


jobs:
    test-frontend:
        runs-on: ubuntu-latest
        
        steps:
            - name: code checout
              uses: actions/checkout@v7

            - name: set up node jobs
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm  
                cache-dependency-path: frontend/package-lock.json

            - name: install npm package
              run: npm install
              working-directory: frontend

            - name: Run the Linter
              run: npm run lint
              working-directory: frontend

            - name: Run the test
              run: npm run test
              working-directory: frontend
  
  
    test-backend:
        
        runs-on: ubuntu-latest
        
        steps:
            - name: checkout code
              uses: actions/checkout@v7

            - name:  set up the Gcontinue-on-error
              uses:  actions/setup-go@v6
              with:
                go-version: '1.23'
                go-version-file: 'go.mod'
                cache-dependency-path: 'go.sum'

            - name:  Run test 
              run: go test
              working-directory: backend

          
        


            
