#Goal-> i have to lint,build, test,  the code for frontend & backend 
# push the the code to docker hub 
name: CI


on:
    push:
        branches: [master]

        

jobs:
    frontend:
        runs-on: ubuntu-latest

        steps:
            - name: code checkout
              uses: actions/checkout@v7
            
            - name: set up node jobs
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm  
                cache-dependency-path: frontend/package-lock.json

            - name: install npm package
              run: npm install
              working-directory: frontend

            - name: Run the Linter
              run: npm run lint
              working-directory: frontend

            - name: Run the test
              run: npm run test
              working-directory: frontend

            - name: docker setup [login]
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Docker build and push
              uses: docker/build-push-action@v7
              with:
                context: ./frontend
                push: true
                tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-fe-two:latest

    backend:
      needs: frontend
      runs-on: ubuntu-latest
      
      steps:
        - name:  code checkout
          uses:  actions/checkout@v7

        - name:  set up the Gcontinue-on-error
          uses:  actions/setup-go@v6
          with:
            go-version: '1.23'
            go-version-file: 'go.mod'
            cache-dependency-path: 'go.sum'
            
        - name:  Run Linter
          run:  go fmt
          working-directory: backend

        - name: run wet for comiler issue
          run:  go vet
          working-directory: backend

        
        - name:  Run test 
          run: go test
          working-directory: backend

        
        - name: Docker setup [login]
          uses: docker/login-action@v4
          with:
            username:  ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }} 

        - name: Docker build and push
          uses: docker/build-push-action@v7
          with:
            context: ./backend
            push:  true
            tags:   ${{ vars.DOCKERHUB_USERNAME }}/devboard-back:latest

    deploy:
      needs: [frontend,backend]
      uses: ./.github/workflows/Cd.yml
      secrets: inherit

